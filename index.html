<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Рецепты бай - сайт с рецептами блюд разной кулинарии</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&display=swap" rel="stylesheet">
</head>
<body>
<header class="header">
    <div class="header-container">
        <div class="logo">
            <span class="logo-icon">🍲</span> Рецепты бай
        </div>
        <nav class="nav">
            <a href="#" data-page="catalog" class="nav-link active">Рецепты</a>
            <a href="#" data-page="favorites" class="nav-link">Избранное</a>
            <a href="#" data-page="profile" class="nav-link" id="profileNavLink">👤 Профиль</a>
        </nav>
        <div class="auth-buttons" id="authButtons">
            <button id="loginBtn" class="auth-btn">Войти</button>
            <button id="registerBtn" class="auth-btn">Регистрация</button>
        </div>
        <div class="user-welcome" id="userWelcome" style="display: none;">
            <span id="userName"></span>
            <button id="logoutBtn" class="logout-btn">Выйти</button>
        </div>
        <div class="mobile-menu-btn" id="mobileMenuBtn">☰</div>
    </div>
</header>

<main id="app"></main>

<!-- Модалки для логина/регистрации -->
<div id="loginModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h2>Вход</h2>
        <input type="text" id="loginUsername" placeholder="Логин" autocomplete="off">
        <input type="password" id="loginPassword" placeholder="Пароль">
        <button id="doLoginBtn">Войти</button>
        <div id="loginError" class="error-msg"></div>
    </div>
</div>

<div id="registerModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h2>Регистрация</h2>
        <input type="text" id="regUsername" placeholder="Логин (мин 3 символа)" autocomplete="off">
        <input type="email" id="regEmail" placeholder="Email">
        <input type="password" id="regPassword" placeholder="Пароль (мин 4 символа)">
        <button id="doRegisterBtn">Зарегистрироваться</button>
        <div id="regError" class="error-msg"></div>
    </div>
</div>

<footer class="footer">
    <p>© 2025 Вкусный Дневник — все рецепты с душой.</p>
</footer>

<script src="script.js"></script>
</body>
</html>
